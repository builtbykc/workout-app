<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#111113"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Workout"/>
  <title>Workout Split</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#111113;--surface:#18181B;--surface2:#1C1C1F;
      --border:#2A2A2E;--border2:#222226;
      --text:#F4F3F0;--sub:#A0A0A8;--muted:#64646C;--faint:#48484F;
      --row-a:#111113;--row-b:#16161A;--tag-bg:rgba(255,255,255,0.07);
      --day-color:#C8E600;--accent:#C8E600;
      --tr:background 0.22s ease,color 0.22s ease,border-color 0.22s ease;
    }
    :root.light{
      --bg:#F7F6F2;--surface:#FFFFFF;--surface2:#F2F1EE;
      --border:#DDDBD5;--border2:#E8E6E1;
      --text:#18181B;--sub:#52525B;--muted:#8C8C95;--faint:#C0C0C8;
      --row-a:#FFFFFF;--row-b:#F9F8F5;--tag-bg:rgba(0,0,0,0.05);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;transition:var(--tr)}

    /* SPLASH */
    #splash{position:fixed;inset:0;z-index:200;background:#111113;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;transition:opacity 0.5s ease}
    #splash.fade{opacity:0;pointer-events:none}
    #splash.gone{display:none}
    .splash-icon svg{width:68px;height:68px}
    .splash-title{font-size:28px;font-weight:800;color:#F4F3F0;letter-spacing:-0.5px}
    .splash-sub{font-size:11px;font-weight:600;color:#555;letter-spacing:2px;text-transform:uppercase}
    .splash-dot{width:6px;height:6px;border-radius:50%;background:#C8E600;animation:pulse 1.2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

    /* ONBOARDING */
    #onboard{position:fixed;inset:0;z-index:160;background:var(--bg);display:flex;flex-direction:column;justify-content:center;max-width:480px;margin:0 auto;padding:32px 26px calc(34px + env(safe-area-inset-bottom));transition:opacity 0.35s ease}
    #onboard.hide{opacity:0;pointer-events:none}
    .ob-icon svg{width:52px;height:52px;margin-bottom:22px}
    .ob-h{font-size:26px;font-weight:800;letter-spacing:-0.6px;margin-bottom:6px}
    .ob-p{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:26px}
    .lbl{display:block;font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin:0 2px 9px}
    .field{width:100%;padding:15px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;color:var(--text);font-size:16px;font-family:inherit;font-weight:600;outline:none;transition:var(--tr)}
    .field::placeholder{color:var(--faint);font-weight:500}
    .field:focus{border-color:var(--accent)}
    .gap{height:22px}

    /* SEGMENTED CONTROL */
    .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:6px;transition:var(--tr)}
    .seg button{padding:13px 6px;border:none;border-radius:9px;background:transparent;color:var(--sub);font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background 0.18s,color 0.18s}
    .seg button span:first-child{font-size:15px;font-weight:800;letter-spacing:-0.2px}
    .seg .seg-sub{font-size:9px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;opacity:0.75}
    .seg button.on{background:var(--accent);color:#000}
    .hint{font-size:11px;color:var(--muted);margin:11px 2px 0;display:flex;align-items:center;gap:6px}
    .hint b{color:var(--sub);font-weight:700}

    .btn-primary{width:100%;padding:16px;border:none;border-radius:14px;background:var(--accent);color:#000;font-weight:800;font-size:15px;font-family:inherit;cursor:pointer;letter-spacing:0.2px;transition:opacity 0.18s}
    .btn-primary:disabled{opacity:0.35;cursor:not-allowed}
    .btn-ghost{width:100%;padding:14px;border:1px solid var(--border);border-radius:14px;background:transparent;color:var(--sub);font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;transition:var(--tr)}

    /* SETTINGS OVERLAY */
    .overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.55);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s ease}
    .overlay.show{opacity:1;pointer-events:auto}
    .sheet{width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--border);border-radius:22px 22px 0 0;padding:10px 22px calc(26px + env(safe-area-inset-bottom));transform:translateY(20px);transition:transform 0.28s cubic-bezier(.2,.8,.2,1);max-height:90dvh;overflow-y:auto}
    .overlay.show .sheet{transform:translateY(0)}
    .sheet::-webkit-scrollbar{display:none}
    .grab{width:38px;height:4px;border-radius:4px;background:var(--border);margin:0 auto 18px}
    .sheet-title{font-size:19px;font-weight:800;letter-spacing:-0.3px;margin-bottom:22px}
    .theme-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:13px;transition:var(--tr)}
    .theme-row span{font-size:14px;font-weight:600}
    .mini-toggle{display:flex;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:4px}
    .mini-toggle button{padding:7px 13px;border:none;border-radius:6px;background:transparent;color:var(--sub);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:var(--tr)}
    .mini-toggle button.on{background:var(--accent);color:#000}

    /* LAYOUT */
    #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}

    /* HEADER */
    .header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;padding-top:calc(16px + env(safe-area-inset-top));border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;transition:var(--tr)}
    .h-left{min-width:0}
    .h-left .eyebrow{font-size:10px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .h-left .title{font-size:21px;font-weight:800;letter-spacing:-0.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .h-actions{display:flex;gap:8px;flex-shrink:0;margin-left:12px}
    .icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:11px;cursor:pointer;font-size:16px;color:var(--sub);transition:var(--tr)}

    /* SCHEDULE STRIP */
    .schedule-strip{display:grid;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
    .sched-day{padding:10px 6px;background:var(--surface);text-align:center;transition:var(--tr)}
    .sched-day .sd-day{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .sched-day .sd-name{font-size:11px;font-weight:600;color:var(--sub);line-height:1.2}
    .sched-day.highlight .sd-day{color:var(--day-color)}
    .sched-day.highlight .sd-name{color:var(--text)}

    /* LEGEND */
    .legend{display:flex;flex-wrap:wrap;gap:7px 11px;padding:10px 20px;border-bottom:1px solid var(--border2);background:var(--surface2);transition:var(--tr);min-height:36px}
    .legend-item{display:flex;align-items:center;gap:5px}
    .legend-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
    .legend-label{font-size:10px;font-weight:600;color:var(--sub)}

    /* DAY TABS */
    .day-tabs{display:grid;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
    .day-tab{padding:11px 3px;background:var(--surface);color:var(--muted);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:11px;transition:background 0.15s,color 0.15s;display:flex;flex-direction:column;align-items:center;gap:2px}
    .day-tab.active{color:#000}
    .day-tab .tab-sub{font-size:8px;font-weight:600;letter-spacing:0.5px;opacity:0.65;text-transform:uppercase}

    /* DAY NOTE */
    .day-note{padding:10px 20px;font-size:12px;color:var(--sub);font-style:italic;background:var(--surface2);border-bottom:1px solid var(--border2);transition:var(--tr);display:flex;align-items:center;gap:8px}
    .day-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;font-style:normal;flex-shrink:0;letter-spacing:0.8px;text-transform:uppercase}

    /* TABLE */
    .table-header{display:grid;grid-template-columns:6px 1fr 48px 84px 56px;gap:0 12px;padding:9px 20px;border-bottom:1px solid var(--border2);background:var(--surface);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);transition:var(--tr)}
    .table-header span:not(:first-child):not(:nth-child(2)){text-align:center}
    .ex-row{display:grid;grid-template-columns:6px 1fr 48px 84px 56px;gap:0 12px;padding:14px 20px;border-bottom:1px solid var(--border2);align-items:center;transition:background 0.2s}
    .ex-row:nth-child(odd){background:var(--row-a)}
    .ex-row:nth-child(even){background:var(--row-b)}
    .bar{width:4px;height:32px;border-radius:4px}
    .ex-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px}
    .ex-tag{display:inline-block;font-size:9px;font-weight:700;border-radius:4px;padding:1px 7px;letter-spacing:0.8px;background:var(--tag-bg)}
    .sets-num{text-align:center;font-size:22px;font-weight:800;line-height:1}
    .reps-num{text-align:center;font-size:12px;font-weight:500;color:var(--text)}
    .rest-num{text-align:center;font-size:11px;color:var(--sub);font-family:'DM Mono',monospace}

    /* TOTAL */
    .total-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-top:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);background:var(--surface);transition:var(--tr)}

    /* RECOVERY BOX */
    .recovery{margin:12px 20px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);transition:var(--tr)}
    .recovery-header{padding:12px 16px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border2)}
    .recovery-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border2);align-items:flex-start}
    .recovery-item:last-child{border-bottom:none}
    .recovery-icon{font-size:16px;flex-shrink:0;margin-top:1px}
    .recovery-text{font-size:12px;color:var(--sub);line-height:1.6}
    .recovery-text strong{color:var(--text);font-weight:600}

    /* NOTES */
    .notes{margin:12px 20px 28px;border:1px solid var(--border);border-radius:10px;padding:16px;background:var(--surface);transition:var(--tr)}
    .notes-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
    .note-item{display:flex;gap:10px;margin-bottom:9px;font-size:12px;color:var(--sub);line-height:1.65}
    .note-item:last-child{margin-bottom:0}
    .note-dash{font-weight:700;flex-shrink:0}

    .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .scroll-area::-webkit-scrollbar{display:none}
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="28" y="31" width="16" height="10" rx="2" fill="#C8E600"/>
      <rect x="6" y="24" width="10" height="24" rx="3" fill="#C8E600"/>
      <rect x="16" y="28" width="12" height="16" rx="2" fill="#C8E600"/>
      <rect x="56" y="24" width="10" height="24" rx="3" fill="#C8E600"/>
      <rect x="44" y="28" width="12" height="16" rx="2" fill="#C8E600"/>
    </svg>
  </div>
  <div class="splash-title">Workout</div>
  <div class="splash-sub" id="splash-sub">Personal Split</div>
  <div class="splash-dot"></div>
</div>

<!-- ONBOARDING -->
<div id="onboard" class="hide">
  <div class="ob-icon">
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="28" y="31" width="16" height="10" rx="2" fill="#C8E600"/>
      <rect x="6" y="24" width="10" height="24" rx="3" fill="#C8E600"/>
      <rect x="16" y="28" width="12" height="16" rx="2" fill="#C8E600"/>
      <rect x="56" y="24" width="10" height="24" rx="3" fill="#C8E600"/>
      <rect x="44" y="28" width="12" height="16" rx="2" fill="#C8E600"/>
    </svg>
  </div>
  <div class="ob-h">Let's set you up</div>
  <div class="ob-p">A few quick details and your personal training week is ready.</div>

  <label class="lbl">What should we call you?</label>
  <input class="field" id="ob-name" type="text" autocomplete="given-name" placeholder="Your name"
    oninput="document.getElementById('ob-go').disabled=!this.value.trim()"
    onkeydown="if(event.key==='Enter'&&this.value.trim())completeOnboarding()"/>

  <div class="gap"></div>

  <label class="lbl">Pick your weekly split</label>
  <div class="seg" id="ob-seg"></div>
  <div class="hint">⟳ <span>Every split trains <b>each muscle 2× a week</b></span></div>

  <div class="gap"></div>
  <button class="btn-primary" id="ob-go" disabled onclick="completeOnboarding()">Get Started</button>
</div>

<!-- SETTINGS -->
<div class="overlay" id="settings" onclick="if(event.target===this)closeSettings()">
  <div class="sheet">
    <div class="grab"></div>
    <div class="sheet-title">Settings</div>

    <label class="lbl">Your name</label>
    <input class="field" id="set-name" type="text" autocomplete="given-name" placeholder="Your name"/>

    <div class="gap"></div>
    <label class="lbl">Weekly split</label>
    <div class="seg" id="set-seg"></div>

    <div class="gap"></div>
    <label class="lbl">Appearance</label>
    <div class="theme-row">
      <span>Theme</span>
      <div class="mini-toggle" id="set-theme">
        <button data-t="dark" onclick="pickTheme('dark')">Dark</button>
        <button data-t="light" onclick="pickTheme('light')">Light</button>
      </div>
    </div>

    <div class="gap"></div>
    <button class="btn-primary" onclick="saveSettings()">Save</button>
    <div style="height:10px"></div>
    <button class="btn-ghost" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="h-left">
      <div class="eyebrow" id="eyebrow"></div>
      <div class="title" id="title"></div>
    </div>
    <div class="h-actions">
      <button class="icon-btn" aria-label="Settings" onclick="openSettings()">⚙︎</button>
      <button class="icon-btn" aria-label="Theme" onclick="toggleTheme()"><span id="theme-icon">☀︎</span></button>
    </div>
  </div>

  <div class="scroll-area">
    <div class="schedule-strip" id="schedule-strip"></div>
    <div class="legend" id="legend"></div>
    <div class="day-tabs" id="day-tabs"></div>
    <div class="day-note" id="day-note"></div>
    <div class="table-header">
      <span></span><span>Exercise</span>
      <span>Sets</span><span>Reps</span><span>Rest</span>
    </div>
    <div id="exercise-list"></div>
    <div class="total-bar">
      <span>Total Volume</span>
      <span id="total-val" style="color:var(--day-color)"></span>
    </div>
    <div class="recovery" id="recovery-box"></div>
    <div class="notes" id="notes-box"></div>
  </div>
</div>

<script>
const muscleColor={
  CHEST:"#FB923C",BACK:"#38BDF8",SHOULDERS:"#F472B6",
  BICEPS:"#34D399",TRICEPS:"#FBBF24",ABS:"#A3A3A3",
  QUADS:"#A78BFA",HAMSTRINGS:"#C084FC",GLUTES:"#E879F9",CALVES:"#818CF8"
};

const ABBR={Monday:"MON",Tuesday:"TUE",Wednesday:"WED",Thursday:"THU",Friday:"FRI",Saturday:"SAT",Sunday:"SUN"};

const recovery=[
  {icon:"🍗",title:"Hit your protein",text:"Aim for roughly 1.6–2.2 g of protein per kg of bodyweight each day, spread across meals — it's the raw material your muscles rebuild with."},
  {icon:"😴",title:"Sleep 7–9 hours",text:"Muscle is built while you rest, not while you train. Consistent, quality sleep is where the work actually pays off."},
  {icon:"🚶",title:"Active recovery",text:"On rest days keep moving — a walk, light stretching or foam rolling boosts blood flow and speeds recovery without adding fatigue."}
];

/* ===== ROUTINES — every split trains each muscle 2× per week ===== */
const ROUTINES={
  "3":{
    splitName:"3-Day Split",
    eyebrow:"3-DAY · FULL BODY + U/L",
    days:[
      {id:"FB",label:"Full Body",theme:"#C8E600",sub:"Strength",day:"Monday",badge:"FULL BODY",
       note:"One big compound day — every major muscle gets its first hit of the week.",
       ex:[
         {m:"QUADS",     n:"Barbell Back Squat",      s:4,r:"6–8",   rest:"2 min"},
         {m:"CHEST",     n:"Barbell Bench Press",     s:4,r:"6–8",   rest:"2 min"},
         {m:"BACK",      n:"Barbell Row",             s:4,r:"6–8",   rest:"90s"},
         {m:"SHOULDERS", n:"Overhead Press",          s:3,r:"8–10",  rest:"90s"},
         {m:"HAMSTRINGS",n:"Romanian Deadlift",       s:3,r:"8–10",  rest:"90s"},
         {m:"BICEPS",    n:"EZ-Bar Curl",             s:2,r:"10–12", rest:"60s"},
         {m:"TRICEPS",   n:"Triceps Pushdown",        s:2,r:"10–12", rest:"60s"},
         {m:"CALVES",    n:"Standing Calf Raise",     s:3,r:"12–15", rest:"45s"},
       ]},
      {id:"U3",label:"Upper",theme:"#3DDBA8",sub:"Hypertrophy",day:"Wednesday",badge:"HYPERTROPHY",
       note:"Second upper-body hit — moderate weight, higher reps to build the torso and arms.",
       ex:[
         {m:"CHEST",     n:"Incline Dumbbell Press",      s:4,r:"8–10",  rest:"90s"},
         {m:"BACK",      n:"Lat Pulldown",                s:4,r:"10–12", rest:"75s"},
         {m:"SHOULDERS", n:"Seated DB Shoulder Press",    s:3,r:"10–12", rest:"75s"},
         {m:"BACK",      n:"Seated Cable Row",            s:3,r:"10–12", rest:"75s"},
         {m:"SHOULDERS", n:"Dumbbell Lateral Raises",     s:3,r:"12–15", rest:"45s"},
         {m:"BICEPS",    n:"Dumbbell Curl",               s:3,r:"10–12", rest:"60s"},
         {m:"TRICEPS",   n:"Overhead Tricep Extension",   s:3,r:"12–15", rest:"60s"},
       ]},
      {id:"L3",label:"Lower",theme:"#818CF8",sub:"Hypertrophy",day:"Friday",badge:"HYPERTROPHY",
       note:"Second lower-body hit — quads, hamstrings, glutes and calves with focused volume.",
       ex:[
         {m:"QUADS",     n:"Leg Press",               s:4,r:"8–10",      rest:"90s"},
         {m:"HAMSTRINGS",n:"Lying Leg Curl",          s:4,r:"10–12",     rest:"75s"},
         {m:"GLUTES",    n:"Bulgarian Split Squat",   s:3,r:"10–12 each",rest:"90s"},
         {m:"QUADS",     n:"Leg Extension",           s:3,r:"12–15",     rest:"60s"},
         {m:"CALVES",    n:"Seated Calf Raise",       s:4,r:"12–15",     rest:"45s"},
         {m:"ABS",       n:"Hanging Leg Raises",      s:3,r:"12",        rest:"45s"},
         {m:"ABS",       n:"Cable Crunch",            s:3,r:"15",        rest:"45s"},
       ]},
    ]
  },

  "4":{
    splitName:"4-Day Split",
    eyebrow:"4-DAY · UPPER / LOWER",
    days:[
      {id:"UA",label:"Upper A",theme:"#C8E600",sub:"Strength",day:"Monday",badge:"STRENGTH",
       note:"Heavy compounds, low reps — your body is at peak strength.",
       ex:[
         {m:"CHEST",    n:"Barbell Bench Press",      s:4,r:"5–6",  rest:"2 min"},
         {m:"BACK",     n:"Barbell Row",              s:4,r:"5–6",  rest:"2 min"},
         {m:"SHOULDERS",n:"Overhead Press",           s:3,r:"6–8",  rest:"90s"},
         {m:"BACK",     n:"Pull-Ups / Lat Pulldown",  s:3,r:"6–8",  rest:"90s"},
         {m:"BICEPS",   n:"Barbell or EZ-Bar Curl",   s:3,r:"8",    rest:"75s"},
         {m:"TRICEPS",  n:"Skull Crushers",           s:3,r:"8",    rest:"75s"},
       ]},
      {id:"LA",label:"Lower A",theme:"#FF6B6B",sub:"Strength",day:"Tuesday",badge:"STRENGTH",
       note:"Heavy lower compounds — squat and hinge strength focus.",
       ex:[
         {m:"QUADS",     n:"Barbell Back Squat",      s:4,r:"5–6",   rest:"2 min"},
         {m:"HAMSTRINGS",n:"Romanian Deadlift",       s:4,r:"6–8",   rest:"90s"},
         {m:"QUADS",     n:"Leg Press",               s:3,r:"8–10",  rest:"90s"},
         {m:"CALVES",    n:"Calf Raises",             s:4,r:"12–15", rest:"60s"},
         {m:"ABS",       n:"Hanging Leg Raises",      s:3,r:"12",    rest:"45s"},

/* ===== STATE ===== */
const LS={name:"wk_name",routine:"wk_routine",theme:"wk_theme"};
let name=localStorage.getItem(LS.name)||"";
let routineKey=ROUTINES[localStorage.getItem(LS.routine)]?localStorage.getItem(LS.routine):"4";
let isDark=(localStorage.getItem(LS.theme)||"dark")!=="light";
let activeDay=null;
let obRoutine="4", setRoutine=routineKey, setTheme=isDark?"dark":"light";

function currentRoutine(){return ROUTINES[routineKey]}
function cap(s){return s[0]+s.slice(1).toLowerCase()}
function rgba(hex,a){const h=hex.replace("#","");return `rgba(${parseInt(h.substr(0,2),16)},${parseInt(h.substr(2,2),16)},${parseInt(h.substr(4,2),16)},${a})`}
function setDayColor(c){document.documentElement.style.setProperty("--day-color",c);document.querySelectorAll(".note-dash").forEach(el=>el.style.color=c)}
function greeting(){const h=new Date().getHours();return h<12?"Good morning":h<18?"Good afternoon":"Good evening"}

/* ===== RENDER ===== */
function renderHeader(){
  const R=currentRoutine();
  document.getElementById("eyebrow").textContent=R.eyebrow;
  document.getElementById("title").textContent=`${greeting()}, ${name}`;
}

function renderScheduleStrip(){
  const R=currentRoutine(),strip=document.getElementById("schedule-strip");
  strip.style.gridTemplateColumns=`repeat(${R.days.length},1fr)`;
  strip.innerHTML=R.days.map(d=>
    `<div class="sched-day ${d.id===activeDay?'highlight':''}">
      <div class="sd-day">${ABBR[d.day]}</div>
      <div class="sd-name">${d.label}</div>
    </div>`
  ).join("");
}

function renderLegend(){
  const day=currentRoutine().days.find(d=>d.id===activeDay);
  const seen=new Set(),items=[];
  day.ex.forEach(e=>{if(!seen.has(e.m)){seen.add(e.m);items.push(e.m)}});
  document.getElementById("legend").innerHTML=items.map(m=>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${muscleColor[m]}"></div>
      <span class="legend-label">${cap(m)}</span>
    </div>`
  ).join("");
}

function renderTabs(){
  const R=currentRoutine(),tabs=document.getElementById("day-tabs");
  tabs.style.gridTemplateColumns=`repeat(${R.days.length},1fr)`;
  tabs.innerHTML=R.days.map(d=>
    `<button class="day-tab ${d.id===activeDay?'active':''}"
      style="${d.id===activeDay?`background:${d.theme};`:''}"
      onclick="selectDay('${d.id}')">
      ${d.label}
      <span class="tab-sub">${d.sub}</span>
    </button>`
  ).join("");
}

function renderExercises(){
  const day=currentRoutine().days.find(d=>d.id===activeDay);
  setDayColor(day.theme);
  document.getElementById("day-note").innerHTML=
    `<span class="day-badge" style="background:${rgba(day.theme,0.15)};color:${day.theme}">${day.badge}</span>
     <span>${day.day} — ${day.note}</span>`;
  document.getElementById("exercise-list").innerHTML=day.ex.map(e=>
    `<div class="ex-row">
      <div class="bar" style="background:${muscleColor[e.m]}"></div>
      <div>
        <div class="ex-name">${e.n}</div>
        <span class="ex-tag" style="color:${muscleColor[e.m]}">${cap(e.m)}</span>
      </div>
      <div class="sets-num" style="color:${day.theme}">${e.s}</div>
      <div class="reps-num">${e.r}</div>
      <div class="rest-num">${e.rest}</div>
    </div>`
  ).join("");
  document.getElementById("total-val").textContent=
    `${day.ex.reduce((a,e)=>a+e.s,0)} sets · ${day.ex.length} exercises`;
}

function renderRecovery(){
  const R=currentRoutine();
  const lastId=R.days[R.days.length-1].id;
  const box=document.getElementById("recovery-box");
  if(activeDay===lastId){
    box.style.display="block";
    box.innerHTML=`<div class="recovery-header">♻️ Recovery Essentials</div>`+
      recovery.map(r=>`<div class="recovery-item">
        <div class="recovery-icon">${r.icon}</div>
        <div class="recovery-text"><strong>${r.title}</strong> — ${r.text}</div>
      </div>`).join("");
  } else { box.style.display="none"; }
}

function renderNotes(){
  const notes=[
    `${name}, every muscle group is trained <b>2× a week</b> — frequency is what drives growth.`,
    `Progressive overload: add weight or a rep when you hit the top of the range on all sets.`,
    `Leave 1–2 reps in reserve on compounds; push your last set of isolation work close to failure.`,
    `Warm up 5–10 min and do 2 light ramp-up sets before your first heavy compound.`,
    `Rest days are part of the plan — that's when the muscle is actually rebuilt.`
  ];
  document.getElementById("notes-box").innerHTML=
    `<div class="notes-title">Protocol Notes</div>`+
    notes.map(t=>`<div class="note-item"><span class="note-dash" style="color:var(--day-color)">—</span><span>${t.replace(/<b>/g,'<strong style="color:var(--text);font-weight:600">').replace(/<\/b>/g,'</strong>')}</span></div>`).join("");
}

function render(){
  if(!activeDay||!currentRoutine().days.some(d=>d.id===activeDay)) activeDay=currentRoutine().days[0].id;
  renderHeader();
  renderScheduleStrip();
  renderTabs();
  renderLegend();
  renderExercises();
  renderRecovery();
  renderNotes();
  document.getElementById("splash-sub").textContent=currentRoutine().splitName;
}

function selectDay(id){activeDay=id;render()}

/* ===== THEME ===== */
function applyTheme(){
  document.documentElement.classList.toggle("light",!isDark);
  document.getElementById("theme-icon").textContent=isDark?"☀︎":"☾";
  document.querySelector('meta[name="theme-color"]').content=isDark?"#111113":"#F7F6F2";
}
function toggleTheme(){
  isDark=!isDark;
  localStorage.setItem(LS.theme,isDark?"dark":"light");
  applyTheme();
}

/* ===== SEGMENTED CONTROL ===== */
function buildSeg(containerId,selected){
  const opts=[["3","3-Day","Full Body+"],["4","4-Day","Upper/Lower"],["5","5-Day","PPL Hybrid"]];
  document.getElementById(containerId).innerHTML=opts.map(([v,l,s])=>
    `<button class="${v===selected?'on':''}" onclick="segPick('${containerId}','${v}')">
       <span>${l}</span><span class="seg-sub">${s}</span></button>`).join("");
}
function segPick(containerId,v){
  if(containerId==="ob-seg") obRoutine=v; else setRoutine=v;
  buildSeg(containerId,v);
}

/* ===== ONBOARDING ===== */
function showOnboard(){
  obRoutine="4";
  buildSeg("ob-seg",obRoutine);
  document.getElementById("onboard").classList.remove("hide");
}
function completeOnboarding(){
  const v=document.getElementById("ob-name").value.trim();
  if(!v) return;
  name=v; routineKey=obRoutine;
  localStorage.setItem(LS.name,name);
  localStorage.setItem(LS.routine,routineKey);
  localStorage.setItem(LS.theme,isDark?"dark":"light");
  activeDay=currentRoutine().days[0].id;
  document.getElementById("onboard").classList.add("hide");
  render();
}

/* ===== SETTINGS ===== */
function pickTheme(t){
  setTheme=t;
  document.querySelectorAll("#set-theme button").forEach(b=>b.classList.toggle("on",b.dataset.t===t));
}
function openSettings(){
  document.getElementById("set-name").value=name;
  setRoutine=routineKey; buildSeg("set-seg",setRoutine);
  setTheme=isDark?"dark":"light"; pickTheme(setTheme);
  document.getElementById("settings").classList.add("show");
}
function closeSettings(){document.getElementById("settings").classList.remove("show")}
function saveSettings(){
  const v=document.getElementById("set-name").value.trim();
  if(v) name=v;
  const routineChanged=setRoutine!==routineKey;
  routineKey=setRoutine;
  isDark=setTheme==="dark";
  localStorage.setItem(LS.name,name);
  localStorage.setItem(LS.routine,routineKey);
  localStorage.setItem(LS.theme,isDark?"dark":"light");
  if(routineChanged) activeDay=currentRoutine().days[0].id;
  applyTheme();
  closeSettings();
  render();
}

/* ===== INIT ===== */
applyTheme();
if(name){ render(); } else { render(); showOnboard(); }
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
function hideSplash(){const s=document.getElementById("splash");s.classList.add("fade");setTimeout(()=>s.classList.add("gone"),520);}
window.addEventListener("load",()=>setTimeout(hideSplash,1200));
</script>
